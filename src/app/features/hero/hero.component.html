<section id="hero" class="hero" [ngClass]="{ 'dark-hero': theme.darkMode() }">
  <div class="hero-container">
    <div class="hero-content">
      <div class="hero-text">
        <h1 class="hero-name">
          <span class="accent">{{ 'HERO.NAME' | translate }}</span>
        </h1>
        <h3 class="hero-subtitle">{{ 'HERO.SUBTITLE' | translate }}</h3>
        <h2 class="typewriter">
          {{ typedText }}<span class="blinking-cursor">|</span>
        </h2>

        <div class="hero-buttons">
          <button class="btn-primary" type="button" (click)="openContactDialog()">
            <span>{{ 'HERO.CONTACT_ME' | translate }}</span>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
          <button class="btn-secondary" type="button" (click)="scrollTo('experience')">
            <span>{{ 'HERO.VIEW_WORK' | translate }}</span>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 12h20M12 2l10 10-10 10"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="hero-image">
        <div class="image-container" [ngClass]="{ 'dark-image': theme.darkMode() }">
          <img src="assets/img/pic.jpg" [alt]="'HERO.PROFILE_ALT' | translate" class="profile-pic">
          <div class="image-backdrop"></div>
          <div class="image-decoration"></div>
        </div>
      </div>
    </div>

    <div class="scroll-indicator" (click)="scrollTo('about')">
      <div class="mouse">
        <div class="wheel"></div>
      </div>
      <div class="arrow">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <div class="contact-overlay" *ngIf="isContactDialogOpen" (click)="closeContactDialog()">
    <div
      class="contact-dialog"
      [ngClass]="{ 'dark-dialog': theme.darkMode() }"
      (click)="$event.stopPropagation()"
    >
      <div class="contact-dialog-header">
        <h3 class="contact-dialog-title">{{ 'HERO.CONTACT_DIALOG_TITLE' | translate }}</h3>
        <button
          class="contact-dialog-close"
          type="button"
          (click)="closeContactDialog()"
          [attr.aria-label]="'HERO.CLOSE_CONTACT' | translate"
        >
          ×
        </button>
      </div>

      <form class="contact-dialog-form" #contactFormRef="ngForm" (ngSubmit)="submitContactForm()">
        <label class="contact-field">
          <span class="sr-only">{{ 'HERO.CONTACT_NAME_LABEL' | translate }}</span>
          <input
            type="text"
            name="name"
            [(ngModel)]="contactForm.name"
            [placeholder]="'HERO.CONTACT_NAME_LABEL' | translate"
            required
          >
        </label>

        <label class="contact-field">
          <span class="sr-only">{{ 'HERO.CONTACT_EMAIL_LABEL' | translate }}</span>
          <input
            type="email"
            name="email"
            [(ngModel)]="contactForm.email"
            [placeholder]="'HERO.CONTACT_EMAIL_LABEL' | translate"
            required
          >
        </label>

        <label class="contact-field">
          <span class="sr-only">{{ 'HERO.CONTACT_PHONE_LABEL' | translate }}</span>
          <input
            type="tel"
            name="phone"
            [(ngModel)]="contactForm.phone"
            [placeholder]="'HERO.CONTACT_PHONE_LABEL' | translate"
          >
        </label>

        <label class="contact-field contact-field-message">
          <span class="sr-only">{{ 'HERO.CONTACT_MESSAGE_LABEL' | translate }}</span>
          <textarea
            name="message"
            [(ngModel)]="contactForm.message"
            [placeholder]="'HERO.CONTACT_MESSAGE_LABEL' | translate"
            rows="5"
            required
          ></textarea>
        </label>

        <button class="contact-submit" type="submit" [disabled]="contactFormRef.invalid">
          {{ 'HERO.CONTACT_SEND' | translate }}
        </button>
      </form>
    </div>
  </div>
</section>
